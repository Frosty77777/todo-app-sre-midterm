version: "3.9"

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ./.env
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - auth-service
      - product-service
      - order-service
      - user-service
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    logging: *default-logging
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

  auth-service:
    build:
      context: ./auth-service
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ./.env
    environment:
      - PORT=${AUTH_SERVICE_PORT}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    expose:
      - "${AUTH_SERVICE_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:${AUTH_SERVICE_PORT}/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - postgres
    networks:
      - app-network

  product-service:
    build:
      context: ./product-service
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ./.env
    environment:
      - PORT=${PRODUCT_SERVICE_PORT}
      - DATABASE_URL=${DATABASE_URL}
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    expose:
      - "${PRODUCT_SERVICE_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:${PRODUCT_SERVICE_PORT}/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - postgres
    networks:
      - app-network

  order-service:
    build:
      context: ./order-service
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ./.env
    environment:
      - PORT=${ORDER_SERVICE_PORT}
      - DATABASE_URL=${DATABASE_URL}
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
    expose:
      - "${ORDER_SERVICE_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:${ORDER_SERVICE_PORT}/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - postgres
    networks:
      - app-network

  user-service:
    build:
      context: ./user-service
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ./.env
    environment:
      - PORT=${USER_SERVICE_PORT}
      - DATABASE_URL=${DATABASE_URL}
    expose:
      - "${USER_SERVICE_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:${USER_SERVICE_PORT}/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - postgres
    networks:
      - app-network

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ./.env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    expose:
      - "${POSTGRES_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ./.env
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      - auth-service
      - product-service
      - order-service
      - user-service
    networks:
      - app-network
    
  grafana:
    image: grafana/grafana:11.1.4
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ./.env
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
