<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Task Manager</h1>
            <p class="subtitle">Microservices + SRE enabled workflow</p>
            <div id="auth-buttons">
                <button id="login-btn" class="auth-btn" type="button" onclick="showAuthModalDirect(true)">Login</button>
                <button id="register-btn" class="auth-btn" type="button" onclick="showAuthModalDirect(false)">Register</button>
            </div>
            <div id="user-info" style="display: none;">
                <span id="user-email"></span>
                <button id="logout-btn" class="auth-btn">Logout</button>
            </div>
        </header>

        <!-- Auth Modal -->
        <div id="auth-modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 id="modal-title">Login</h2>
                <form id="auth-form">
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="auth-email" required>
                    </div>
                    <div class="form-group">
                        <label>Password *</label>
                        <input type="password" id="auth-password" required>
                    </div>
                    <button type="submit" id="auth-submit" onclick="handleAuthDirect(event)">Submit</button>
                </form>
            </div>
        </div>

        <section id="todo-form-section" class="section" style="display: none;">
            <h2 id="form-title">Add Task</h2>
            <form id="todo-form">
                <div class="form-group">
                    <label>Task *</label>
                    <input type="text" id="title" required>
                </div>
                <div class="form-group">
                    <label>Description *</label>
                    <textarea id="description" required></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Product *</label>
                        <select id="productId" required>
                            <option value="">Select product</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Status *</label>
                        <select id="priority" required>
                            <option value="pending">pending</option>
                            <option value="processing">processing</option>
                            <option value="completed">completed</option>
                        </select>
                    </div>
                </div>
                <button type="submit" id="submit-btn">Add Task</button>
                <button type="button" id="cancel-btn" style="display: none;">Cancel</button>
            </form>
        </section>

        <section id="welcome-section" class="section">
            <h2>Welcome to Task Manager</h2>
            <div class="welcome-content">
                <h3>How it works</h3>
                <ul>
                    <li>Register and login via auth-service</li>
                    <li>Add Task through order-service</li>
                    <li>Open team chat through user-service WebSocket</li>
                </ul>
            </div>
        </section>

        <section id="todos-section" class="section" style="display: none;">
            <h2>Tasks</h2>
            <div id="loading">Loading...</div>
            <div id="error-message"></div>
            <div id="todos-list"></div>
        </section>

        <section id="chat-section" class="section" style="display: none;">
            <h2>Team Chat</h2>
            <div id="chat-messages" style="max-height: 220px; overflow-y: auto; margin-bottom: 10px; border: 1px solid #ddd; padding: 10px;"></div>
            <form id="chat-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Message</label>
                        <input type="text" id="chat-input" required placeholder="Type a message">
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn-primary">Send</button>
                    </div>
                </div>
            </form>
        </section>
    </div>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
