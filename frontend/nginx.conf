server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
 
    # Health check endpoint (used by Docker healthcheck)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
 
    # Proxy auth requests to auth-service.
    location /api/auth/ {
        proxy_pass         http://auth-service:5001/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
 
    location /api/orders/ {
        proxy_pass http://order-service:5003/api/orders/;
    }

    location /api/products/ {
        proxy_pass http://product-service:5002/api/products/;
    }

    location /socket.io/ {
        proxy_pass http://user-service:5004/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
 
    # Serve static files (index.html, styles.css, app.js)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
 